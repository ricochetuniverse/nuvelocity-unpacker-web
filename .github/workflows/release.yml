name: Create GitHub release and publish to npm

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    if: github.repository == 'ricochetuniverse/nuvelocity-unpacker-web'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          submodules: true

      - name: Set up .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # https://github.com/actions/setup-dotnet/releases/tag/v5.2.0
        with:
          dotnet-version: '9.0'
          workloads: wasm-tools-net8

      - name: Publish .NET app
        run: dotnet publish -c Release src/

      # GitHub releases
      - name: Create zip for GitHub release
        run: |
          zip -rj "dotnet-wasm.zip" web/public/dotnet/wwwroot/_framework/
          mkdir npm/dotnet/
          cp -r web/public/dotnet/wwwroot/_framework/ npm/dotnet/

      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # https://github.com/softprops/action-gh-release/releases/tag/v3.0.0
        with:
          files: |
            dotnet-wasm.zip

      # npm
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # https://github.com/actions/setup-node/releases/tag/v6.4.0
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: npm/package-lock.json

      - name: Create .npmrc
        run: |
          echo '//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}' >> npm/.npmrc
          echo 'registry=https://registry.npmjs.org/' >> npm/.npmrc
          echo 'always-auth=true' >> npm/.npmrc

      - name: Publish
        run: npm publish --provenance --access public
        working-directory: ./npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
