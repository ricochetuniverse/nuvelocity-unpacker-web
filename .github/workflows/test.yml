name: Run .NET and Node.js tests

on:
  push:
    branches: ['master']

  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # https://github.com/actions/checkout/releases/tag/v6.0.3
        with:
          submodules: true

      - name: Set up .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # https://github.com/actions/setup-dotnet/releases/tag/v5.3.0
        with:
          dotnet-version: '8.0'
          workloads: wasm-tools-net8

      - name: Run tests (Debug)
        run: dotnet test -c Debug UnpackerTests/

      - name: Run tests (Release)
        run: dotnet test -c Release UnpackerTests/

      # Node.js
      # Do not split to another file, there is a dependency on .NET through `public/dotnet/wwwroot/_framework/dotnet.js`
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # https://github.com/actions/setup-node/releases/tag/v6.4.0
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install npm dependencies
        run: npm ci
        working-directory: ./web

      - run: npm run tsc -- --build
        working-directory: ./web

      - run: npm run lint
        working-directory: ./web

      - run: npm run prettier -- --check
        working-directory: ./web
